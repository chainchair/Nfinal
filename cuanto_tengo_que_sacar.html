<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Nfinal</title>
</head>

<body style="background-image: url(background.png); 
    background-repeat: no-repeat; text-align: center;">
    <main>
        <h1>Calculadora de nota final</h1>
        <section class="container" style="background-color: #f9f9f9; padding-top: 1px;">
            
                <p style="margin:20px 5px 0px 10px; font-size: 16px">Calcula tus notas hasta el momento,obten cuanto es el minimo que debes sacar
                     y la nota a la que debes apuntar para asegurar la materia,cambia el rango segun el pais </p>
                
            <section id="information" class="container" style="background-color: white; padding: 15px 30px;">  
                <p id="suma-porcentajes" style="display: block; justify-self: end; padding: 0px; margin: 0px;">acumulado: 0%</p>  
                    <div id="lista-parciales" style="padding-bottom: 10px;">
                    <!-- Aquí se van añadiendo las filas dinámicamente -->
                    </div>
                <div style="display:flex; justify-content:space-evenly; margin: 0px ; padding: auto;">
                <button id="btn-agregar" type="button">Añadir nota</button>
                <button id="btn-calcular" type="button">Calcular</button>
                </div>
            
            <section id="objetivo">
                <h2>Resumen</h2>
                <section style="display: grid;
    grid-template-columns: 1fr 1fr;">
                    <p id="nota-minima-resultado"><b>Nota final mínima: </b></p>
                    <p id="promedio-acumulado"><b>Promedio acumulado: </b></p>
                    <p id="nota-deseada-resultado"><b>Nota recomendada: </b></p>
                    <p id="nota-minima-posible"><b>Nota final acumulada: </b></p>
                </section>
            </section>
            </section>
        </section>
    </main>
    <script src="popup.js"></script>
    <script src="script.js"></script>

</body>
</html>
